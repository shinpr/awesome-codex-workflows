name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  awesome-lint:
    name: Awesome Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Validate repository data
        run: node scripts/validate-repos.mjs

      - name: Check README sync
        run: node scripts/check-readme.mjs

      - name: Run awesome-lint
        run: npm run lint:awesome

  links:
    name: Link Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@7cd0af4c74a61395d455af97419279d86aafaede # v2.0.2
        with:
          args: --no-progress --verbose README.md CONTRIBUTING.md .github/**/*.md
